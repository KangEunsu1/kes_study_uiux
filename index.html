<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>과제 관리 시스템 (Notion Style)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* 부드러운 사이드바 애니메이션 */
        #sidebar {
            transition: width 0.3s ease, opacity 0.3s ease;
        }
        #sidebar.closed {
            width: 0;
            opacity: 0;
            overflow: hidden;
            border-right: none;
        }

        /* 드래그 앤 드롭 상태 스타일 */
        .task-card.dragging {
            opacity: 0.5;
            transform: scale(0.98);
        }
        .task-list.drag-over {
            background-color: #f9fafb;
            border-radius: 0.375rem;
        }

        /* contenteditable 요소 포커스 시 외곽선 제거 */
        [contenteditable]:focus {
            outline: none;
        }
        [contenteditable]:empty:before {
            content: attr(placeholder);
            color: #9ca3af;
            pointer-events: none;
            display: block;
        }
    </style>
</head>
<body class="flex h-screen bg-white text-gray-800 font-sans overflow-hidden">

    <aside id="sidebar" class="w-64 bg-[#f7f7f5] border-r border-gray-200 flex flex-col shrink-0">
        <div class="p-3 flex items-center hover:bg-gray-200 cursor-pointer transition-colors m-1 rounded-md">
            <div class="w-6 h-6 bg-blue-500 rounded text-white flex items-center justify-center text-xs font-bold mr-2">U</div>
            <span class="font-medium text-sm truncate flex-1">User's Workspace</span>
            <i data-lucide="chevron-right" class="w-4 h-4 text-gray-500"></i>
        </div>

        <div class="px-2 pb-4">
            <div class="flex items-center p-1.5 text-sm text-gray-600 hover:bg-gray-200 rounded-md cursor-pointer">
                <i data-lucide="search" class="w-4 h-4 mr-2"></i><span>검색</span>
            </div>
            <div class="flex items-center p-1.5 text-sm text-gray-600 hover:bg-gray-200 rounded-md cursor-pointer">
                <i data-lucide="clock" class="w-4 h-4 mr-2"></i><span>업데이트</span>
            </div>
            <div class="flex items-center p-1.5 text-sm text-gray-600 hover:bg-gray-200 rounded-md cursor-pointer">
                <i data-lucide="settings" class="w-4 h-4 mr-2"></i><span>설정과 멤버</span>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto px-2">
            <div class="text-xs font-semibold text-gray-500 px-2 py-1 mb-1">개인 페이지</div>
            <div class="flex items-center justify-between p-1.5 text-sm bg-gray-200 rounded-md cursor-pointer font-medium">
                <div class="flex items-center">
                    <span class="mr-2">📋</span>
                    <span>과제 관리 시스템</span>
                </div>
            </div>
            <div class="flex items-center p-1.5 text-sm text-gray-600 hover:bg-gray-200 rounded-md cursor-pointer mt-1">
                <div class="flex items-center">
                    <i data-lucide="file-text" class="w-4 h-4 mr-2"></i>
                    <span>주간 회의록</span>
                </div>
            </div>
        </div>
    </aside>

    <div class="flex-1 flex flex-col h-full overflow-hidden">
        
        <header class="h-12 flex items-center justify-between px-3 shrink-0 sticky top-0 bg-white/80 backdrop-blur-sm z-10">
            <div class="flex items-center text-gray-500">
                <button id="toggle-sidebar" class="p-1 hover:bg-gray-100 rounded-md mr-2 transition-colors">
                    <i data-lucide="sidebar" class="w-5 h-5"></i>
                </button>
                <div class="text-sm font-medium flex items-center">
                    <span>📋 과제 관리 시스템</span>
                </div>
            </div>
            <div class="flex items-center text-gray-500 gap-1">
                <button class="p-1.5 hover:bg-gray-100 rounded-md text-sm">Share</button>
                <button class="p-1.5 hover:bg-gray-100 rounded-md"><i data-lucide="star" class="w-4 h-4"></i></button>
                <button class="p-1.5 hover:bg-gray-100 rounded-md"><i data-lucide="more-horizontal" class="w-4 h-4"></i></button>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto px-12 py-8 max-w-5xl mx-auto w-full">
            <div class="group relative mb-8">
                <div class="text-6xl mb-4">📋</div>
                <h1 class="text-4xl font-bold text-gray-800 w-full" contenteditable="true" placeholder="페이지 제목을 입력하세요">과제 관리 시스템 (TMS)</h1>
                <p class="text-gray-400 mt-2" contenteditable="true" placeholder="설명을 입력하세요">진행 중인 모든 프론트엔드 및 기획 과제를 추적하는 공간입니다.</p>
            </div>

            <div class="flex gap-6 items-start mt-10 overflow-x-auto pb-4">
                
                <div class="flex-1 min-w-[280px] task-column" data-status="todo">
                    <div class="flex items-center justify-between mb-3 text-sm font-medium text-gray-600">
                        <div class="flex items-center">
                            <div class="w-4 h-4 rounded-sm bg-red-100 text-red-600 flex items-center justify-center text-[10px] mr-2">할 일</div>
                            <span>To Do</span>
                            <span class="ml-2 text-gray-400 font-normal column-count">2</span>
                        </div>
                        <div class="flex gap-1">
                            <i data-lucide="plus" class="w-4 h-4 cursor-pointer hover:bg-gray-200 rounded"></i>
                            <i data-lucide="more-horizontal" class="w-4 h-4 cursor-pointer hover:bg-gray-200 rounded"></i>
                        </div>
                    </div>
                    
                    <div class="task-list flex flex-col gap-2 min-h-[100px] pb-2 transition-colors">
                        <div class="task-card bg-white border border-gray-200 p-3 rounded-md shadow-sm hover:shadow-md cursor-grab active:cursor-grabbing transition-shadow" draggable="true">
                            <p class="text-sm font-medium text-gray-800 mb-2">UX 리서치 및 경쟁사 분석</p>
                            <span class="inline-block px-2 py-0.5 bg-gray-100 text-gray-600 text-xs rounded-sm">Design</span>
                        </div>
                        <div class="task-card bg-white border border-gray-200 p-3 rounded-md shadow-sm hover:shadow-md cursor-grab active:cursor-grabbing transition-shadow" draggable="true">
                            <p class="text-sm font-medium text-gray-800 mb-2">디자인 시스템 구축</p>
                            <span class="inline-block px-2 py-0.5 bg-gray-100 text-gray-600 text-xs rounded-sm">UI</span>
                        </div>
                    </div>
                    <button class="flex items-center text-sm text-gray-400 hover:bg-gray-100 p-2 rounded-md transition-colors w-full text-left mt-1">
                        <i data-lucide="plus" class="w-4 h-4 mr-1"></i> 새로 만들기
                    </button>
                </div>

                <div class="flex-1 min-w-[280px] task-column" data-status="in-progress">
                    <div class="flex items-center justify-between mb-3 text-sm font-medium text-gray-600">
                        <div class="flex items-center">
                            <div class="w-4 h-4 rounded-sm bg-blue-100 text-blue-600 flex items-center justify-center text-[10px] mr-2">진행</div>
                            <span>In Progress</span>
                            <span class="ml-2 text-gray-400 font-normal column-count">1</span>
                        </div>
                        <div class="flex gap-1">
                            <i data-lucide="plus" class="w-4 h-4 cursor-pointer hover:bg-gray-200 rounded"></i>
                            <i data-lucide="more-horizontal" class="w-4 h-4 cursor-pointer hover:bg-gray-200 rounded"></i>
                        </div>
                    </div>
                    
                    <div class="task-list flex flex-col gap-2 min-h-[100px] pb-2 transition-colors">
                        <div class="task-card bg-white border border-gray-200 p-3 rounded-md shadow-sm hover:shadow-md cursor-grab active:cursor-grabbing transition-shadow" draggable="true">
                            <p class="text-sm font-medium text-gray-800 mb-2">메인 대시보드 마크업 구현</p>
                            <span class="inline-block px-2 py-0.5 bg-blue-50 text-blue-600 text-xs rounded-sm">Development</span>
                        </div>
                    </div>
                    <button class="flex items-center text-sm text-gray-400 hover:bg-gray-100 p-2 rounded-md transition-colors w-full text-left mt-1">
                        <i data-lucide="plus" class="w-4 h-4 mr-1"></i> 새로 만들기
                    </button>
                </div>

                <div class="flex-1 min-w-[280px] task-column" data-status="done">
                    <div class="flex items-center justify-between mb-3 text-sm font-medium text-gray-600">
                        <div class="flex items-center">
                            <div class="w-4 h-4 rounded-sm bg-green-100 text-green-600 flex items-center justify-center text-[10px] mr-2">완료</div>
                            <span>Done</span>
                            <span class="ml-2 text-gray-400 font-normal column-count">1</span>
                        </div>
                        <div class="flex gap-1">
                            <i data-lucide="plus" class="w-4 h-4 cursor-pointer hover:bg-gray-200 rounded"></i>
                            <i data-lucide="more-horizontal" class="w-4 h-4 cursor-pointer hover:bg-gray-200 rounded"></i>
                        </div>
                    </div>
                    
                    <div class="task-list flex flex-col gap-2 min-h-[100px] pb-2 transition-colors">
                        <div class="task-card bg-white border border-gray-200 p-3 rounded-md shadow-sm hover:shadow-md cursor-grab active:cursor-grabbing transition-shadow line-through text-gray-500 opacity-70" draggable="true">
                            <p class="text-sm font-medium mb-2">요구사항 명세서 작성</p>
                            <span class="inline-block px-2 py-0.5 bg-gray-100 text-gray-500 text-xs rounded-sm">Planning</span>
                        </div>
                    </div>
                    <button class="flex items-center text-sm text-gray-400 hover:bg-gray-100 p-2 rounded-md transition-colors w-full text-left mt-1">
                        <i data-lucide="plus" class="w-4 h-4 mr-1"></i> 새로 만들기
                    </button>
                </div>

            </div>
        </main>
    </div>

    <script>
        // 1. Lucide 아이콘 초기화
        lucide.createIcons();

        // 2. 사이드바 토글 로직
        const sidebar = document.getElementById('sidebar');
        const toggleBtn = document.getElementById('toggle-sidebar');

        toggleBtn.addEventListener('click', () => {
            sidebar.classList.toggle('closed');
        });

        // 3. 드래그 앤 드롭 로직 구현
        const taskCards = document.querySelectorAll('.task-card');
        const taskLists = document.querySelectorAll('.task-list');

        // 카드 수량 업데이트 함수
        function updateColumnCounts() {
            document.querySelectorAll('.task-column').forEach(column => {
                const count = column.querySelectorAll('.task-card').length;
                column.querySelector('.column-count').innerText = count;
            });
        }

        taskCards.forEach(card => {
            card.addEventListener('dragstart', () => {
                card.classList.add('dragging');
            });

            card.addEventListener('dragend', () => {
                card.classList.remove('dragging');
                
                // 완료(Done) 컬럼으로 이동 시 시각적 처리 (취소선, 투명도)
                const parentColumn = card.closest('.task-column').dataset.status;
                if(parentColumn === 'done') {
                    card.classList.add('line-through', 'text-gray-500', 'opacity-70');
                } else {
                    card.classList.remove('line-through', 'text-gray-500', 'opacity-70');
                }
                updateColumnCounts();
            });
        });

        taskLists.forEach(list => {
            list.addEventListener('dragover', e => {
                e.preventDefault(); // 드롭 허용
                list.classList.add('drag-over');
                
                const afterElement = getDragAfterElement(list, e.clientY);
                const draggable = document.querySelector('.dragging');
                
                if (afterElement == null) {
                    list.appendChild(draggable);
                } else {
                    list.insertBefore(draggable, afterElement);
                }
            });

            list.addEventListener('dragleave', () => {
                list.classList.remove('drag-over');
            });

            list.addEventListener('drop', () => {
                list.classList.remove('drag-over');
            });
        });

        // 마우스 Y 좌표에 따라 삽입할 위치의 다음 요소를 찾는 함수
        function getDragAfterElement(container, y) {
            const draggableElements = [...container.querySelectorAll('.task-card:not(.dragging)')];

            return draggableElements.reduce((closest, child) => {
                const box = child.getBoundingClientRect();
                const offset = y - box.top - box.height / 2;
                if (offset < 0 && offset > closest.offset) {
                    return { offset: offset, element: child };
                } else {
                    return closest;
                }
            }, { offset: Number.NEGATIVE_INFINITY }).element;
        }
    </script>
</body>
</html>
